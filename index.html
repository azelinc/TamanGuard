<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TamanGuard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; color: #000; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { border-bottom: 1px solid #000; padding: 20px 0; }
        h1 { font-size: 1.5rem; font-weight: 600; }
        nav { margin-top: 15px; }
        nav a { color: #000; text-decoration: none; margin-right: 20px; font-size: 0.9rem; }
        nav a:hover { text-decoration: underline; }
        main { padding: 40px 0; }
        .card { border: 1px solid #000; padding: 20px; margin-bottom: 20px; }
        .card h2 { font-size: 1.2rem; margin-bottom: 10px; }
        footer { border-top: 1px solid #000; padding: 20px 0; text-align: center; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>TamanGuard</h1>
            <nav>
                <a href="#">Home</a>
                <a href="#">Residents</a>
                <a href="#">Visitors</a>
                <a href="#">Security</a>
                <a href="#">Settings</a>
            </nav>
        </div>
    </header>
    <main>
        <div class="container">
            <div class="card">
                <h2>Welcome to TamanGuard</h2>
                <p>Residential Management System</p>
            </div>
            <div class="card">
                <h2>Quick Actions</h2>
                <p>Manage residents, visitors, and security access.</p>
            </div>
        </div>
    </main>
    <footer>
        <div class="container">
            <p>&copy; 2026 TamanGuard. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
